<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial=scale=1.0">
        <title>Password Generator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="decor dot-grid-left"></div>
        <div class="decor dot-grid-right"></div>
        <div class="decor zigzag">
            <svg width="40" height="150" viewBox="0 0 40 150" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 10 L30 40 L10 70 L30 100 L10 130" stroke="black" stroke-width="4" stroke-lineup="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="decor hastag">#</div>

        <main class="generator-container">
            <h1 class="main-title">Password Generator</h1>

            <div class="card">
                <div class="yellow-swoosh"></div>

                <div class="form-group">
                    <label for="length">PASSWORD LENGTH:</label>
                    <select id="length">
                        <option value="8">8</option>
                        <option value="12">12</option>
                        <option value="16">16</option>
                        <option value="20">20</option>
                        <option value="24">24</option>
                    </select>
                </div>

                <div class="options-container">
                    <p class="include-label">include :</p>
                    <label class="option-row">
                        <span class="badge">A</span>
                        <span class="option-text">Upper Case (A-Z)</span>
                        <input type="checkbox" id="uppercase" checked>
                        <span class="custom-checkbox"></span>
                    </label>

                    <label class="option-row">
                        <span class="badge">a</span>
                        <span class="option-text">Lower Case (a-z)</span>
                        <input type="checkbox" id="lowercase" checked>
                        <span class="custom-checkbox"></span>
                    </label>

                    <label class="option-row">
                        <span class="badge">9</span>
                        <span class="option-text">Number (0-9)</span>
                        <input type="checkbox" id="numbers" checked>
                        <span class="custom-checkbox"></span>
                    </label>

                    <label class="option-row">
                        <span class="badge">#</span>
                        <span class="option-text">Symbol (#*)</span>
                        <input type="checkbox" id="symbols" checked>
                        <span class="custom-checkbox"></span>
                    </label>
            </div>

            <button id="generate" class="btn-generate">Generate Password :</button>

            <div class="output-box">
                <p class="output-label">Your Password :</p>
                <div class="output-wrapper">
                    <input type="text" id="password-display" readonly placeholder="Click Generate">
                    <button id="copy" class="btn-copy" title="Copy to clipboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect> 
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
    </svg>                        </svg>
                    </button>
                </div>
            </div>
         </div>
        </main>

        <script src="script.js"></script>
        </body>
        </html>
